<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>圓與扇形互動教具</title>
  
  <!-- 引入 React 與 Tailwind CSS -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    // 尋找最大公因數 (計算最簡分數用)
    const gcd = (a, b) => {
      return b === 0 ? a : gcd(b, a % b);
    };

    // 取得最簡分數表示法
    const getFraction = (angle) => {
      if (angle === 0) return "0";
      if (angle === 360) return "1";
      const divisor = gcd(angle, 360);
      const numerator = angle / divisor;
      const denominator = 360 / divisor;
      return `${numerator}/${denominator}`;
    };

    // 極座標轉換為直角座標 (取消四捨五入，保留最高精確度以防圖形變形)
    const polarToCartesian = (cx, cy, r, angleInDegrees) => {
      const rads = (angleInDegrees - 90) * Math.PI / 180.0;
      return {
        x: cx + r * Math.cos(rads),
        y: cy + r * Math.sin(rads)
      };
    };

    // 【終極修正版】產生扇形 SVG Path
    // 解決方案：將所有弧線一律「切半」畫兩次，徹底避開 SVG 渲染 180 度以上大圓弧的 Bug
    const describeArc = (cx, cy, r, startAngle, endAngle) => {
      if (endAngle - startAngle === 0) return "";
      if (endAngle - startAngle >= 360) {
        // 畫完整的圓
        return `M ${cx} ${cy - r} A ${r} ${r} 0 1 1 ${cx} ${cy + r} A ${r} ${r} 0 1 1 ${cx} ${cy - r} Z`;
      }

      const start = polarToCartesian(cx, cy, r, startAngle);
      // 找出中間的角度
      const midAngle = startAngle + (endAngle - startAngle) / 2;
      const mid = polarToCartesian(cx, cy, r, midAngle);
      const end = polarToCartesian(cx, cy, r, endAngle);

      // 連接圓心 -> 起點 -> 經過中點畫小圓弧 -> 終點再畫小圓弧 -> 回到圓心 (完美確保不膨脹)
      return `M ${cx} ${cy} L ${start.x} ${start.y} A ${r} ${r} 0 0 1 ${mid.x} ${mid.y} A ${r} ${r} 0 0 1 ${end.x} ${end.y} Z`;
    };

    // 【終極修正版】產生僅圓弧的 SVG Path (用於標示圓心角)
    const describeJustArc = (cx, cy, r, startAngle, endAngle) => {
      if (endAngle - startAngle === 0 || endAngle - startAngle >= 360) return "";
      
      const start = polarToCartesian(cx, cy, r, startAngle);
      const midAngle = startAngle + (endAngle - startAngle) / 2;
      const mid = polarToCartesian(cx, cy, r, midAngle);
      const end = polarToCartesian(cx, cy, r, endAngle);

      return `M ${start.x} ${start.y} A ${r} ${r} 0 0 1 ${mid.x} ${mid.y} A ${r} ${r} 0 0 1 ${end.x} ${end.y}`;
    };

    function App() {
      const [angle, setAngle] = useState(120); // 預設 120 度
      const [isDragging, setIsDragging] = useState(false);
      const svgRef = useRef(null);

      const SVG_SIZE = 340;
      const CENTER = SVG_SIZE / 2;
      const RADIUS = 135; 
      const BOUNDARY_RADIUS = 150; 

      // 處理拖曳邏輯
      const handlePointerDown = (e) => {
        setIsDragging(true);
        updateAngleFromEvent(e);
        e.target.setPointerCapture(e.pointerId);
      };

      const handlePointerMove = (e) => {
        if (!isDragging) return;
        updateAngleFromEvent(e);
      };

      const handlePointerUp = (e) => {
        setIsDragging(false);
        e.target.releasePointerCapture(e.pointerId);
      };

      const updateAngleFromEvent = (e) => {
        if (!svgRef.current) return;
        const rect = svgRef.current.getBoundingClientRect();
        const x = e.clientX - rect.left - CENTER;
        const y = e.clientY - rect.top - CENTER;
        
        let newAngle = Math.atan2(y, x) * (180 / Math.PI) + 90;
        if (newAngle < 0) newAngle += 360;
        
        const snapAngle = Math.round(newAngle / 5) * 5;
        const finalAngle = snapAngle >= 360 ? 0 : snapAngle;
        setAngle(finalAngle);
      };

      const handlePos = polarToCartesian(CENTER, CENTER, RADIUS, angle);
      const colorA = "#F472B6"; 
      const colorB = "#38BDF8"; 

      return (
        <div className="min-h-screen bg-slate-50 flex items-center justify-center p-4 font-sans text-slate-800">
          <div className="bg-white p-6 md:p-8 rounded-2xl shadow-xl w-full max-w-lg flex flex-col items-center border border-slate-100">
            
            <h1 className="text-2xl font-bold text-slate-700 mb-2">圓與扇形互動教具</h1>
            <p className="text-slate-500 text-sm mb-6 text-center">
              你可以拖曳圓形上的<span className="font-bold text-slate-800">「黑色控制點」</span>，或是拖動下方的拉桿，觀察兩個扇形的變化喔！
            </p>

            {/* 視覺圖形區 */}
            <div className="relative touch-none mb-6">
              <svg
                ref={svgRef}
                width={SVG_SIZE}
                height={SVG_SIZE}
                className="cursor-pointer select-none"
                onPointerDown={handlePointerDown}
                onPointerMove={handlePointerMove}
                onPointerUp={handlePointerUp}
                onPointerCancel={handlePointerUp}
              >
                <circle cx={CENTER} cy={CENTER} r={BOUNDARY_RADIUS} fill="#F1F5F9" stroke="#CBD5E1" strokeWidth="4" />
                <circle cx={CENTER} cy={CENTER} r={RADIUS} fill="#FFFFFF" />

                {/* 藍色扇形 B (因為改用了兩段小圓弧，保證完美貼合不膨脹) */}
                <path
                  d={describeArc(CENTER, CENTER, RADIUS, angle, 360)}
                  fill={colorB}
                />
                
                {/* 粉紅扇形 A */}
                <path
                  d={describeArc(CENTER, CENTER, RADIUS, 0, angle)}
                  fill={colorA}
                />

                <circle cx={CENTER} cy={CENTER} r={RADIUS} fill="none" stroke="#64748B" strokeWidth="2" />
                <line x1={CENTER} y1={CENTER} x2={CENTER} y2={CENTER - RADIUS} stroke="#475569" strokeWidth="3" strokeLinecap="round" />
                <line 
                  x1={CENTER} 
                  y1={CENTER} 
                  x2={handlePos.x} 
                  y2={handlePos.y} 
                  stroke="#1E293B" 
                  strokeWidth="4" 
                  strokeLinecap="round" 
                />

                <circle cx={CENTER} cy={CENTER} r="6" fill="#1E293B" />
                <text x={CENTER - 15} y={CENTER + 20} className="text-xs font-bold" fill="#1E293B">圓心</text>

                {angle > 0 && (
                  <path
                    d={describeJustArc(CENTER, CENTER, 25, 0, angle)}
                    fill="none"
                    stroke="white"
                    strokeWidth="3"
                    opacity="0.8"
                  />
                )}
                {angle < 360 && (
                  <path
                    d={describeJustArc(CENTER, CENTER, 35, angle, 360)}
                    fill="none"
                    stroke="white"
                    strokeWidth="3"
                    strokeDasharray="4 4"
                    opacity="0.8"
                  />
                )}

                <circle 
                  cx={handlePos.x} 
                  cy={handlePos.y} 
                  r="12" 
                  fill="#FFFFFF" 
                  stroke="#1E293B" 
                  strokeWidth="3"
                  className="cursor-grab hover:scale-110 transition-transform shadow-md"
                  style={{ filter: "drop-shadow(0px 2px 3px rgba(0,0,0,0.3))" }}
                />
              </svg>
            </div>

            {/* 數據顯示面板 */}
            <div className="w-full flex gap-4 mb-6">
              <div className="flex-1 rounded-xl p-4 border" style={{ backgroundColor: '#FDF2F8', borderColor: '#FBCFE8' }}>
                <h3 className="text-lg font-bold flex items-center gap-2" style={{ color: '#BE185D' }}>
                  <span className="w-4 h-4 rounded-full inline-block" style={{ backgroundColor: colorA }}></span>
                  粉紅扇形
                </h3>
                <div className="mt-2 text-slate-700 space-y-1 text-sm md:text-base">
                  <p>圓心角：<span className="text-2xl font-bold">{angle}°</span></p>
                  <p>大小：佔圓的 <span className="font-bold text-lg">{angle}/360</span></p>
                  {angle > 0 && angle < 360 && (
                    <p>最簡分數：佔圓的 <span className="font-bold text-lg">{getFraction(angle)}</span></p>
                  )}
                </div>
              </div>

              <div className="flex-1 rounded-xl p-4 border" style={{ backgroundColor: '#F0F9FF', borderColor: '#BAE6FD' }}>
                <h3 className="text-lg font-bold flex items-center gap-2" style={{ color: '#0369A1' }}>
                  <span className="w-4 h-4 rounded-full inline-block" style={{ backgroundColor: colorB }}></span>
                  藍色扇形
                </h3>
                <div className="mt-2 text-slate-700 space-y-1 text-sm md:text-base">
                  <p>圓心角：<span className="text-2xl font-bold">{360 - angle}°</span></p>
                  <p>大小：佔圓的 <span className="font-bold text-lg">{360 - angle}/360</span></p>
                  {angle > 0 && angle < 360 && (
                    <p>最簡分數：佔圓的 <span className="font-bold text-lg">{getFraction(360 - angle)}</span></p>
                  )}
                </div>
              </div>
            </div>

            {/* 拉桿控制區 */}
            <div className="w-full bg-slate-100 p-4 rounded-xl">
              <label htmlFor="angleSlider" className="block text-center font-bold text-slate-700 mb-2">
                拉桿微調粉紅扇形角度
              </label>
              <input
                id="angleSlider"
                type="range"
                min="0"
                max="360"
                step="1"
                value={angle}
                onChange={(e) => setAngle(parseInt(e.target.value))}
                className="w-full h-3 bg-slate-300 rounded-lg appearance-none cursor-pointer accent-pink-500"
              />
            </div>

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
